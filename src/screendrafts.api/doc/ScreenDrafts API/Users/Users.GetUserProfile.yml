info:
  name: Users.GetUserProfile
  type: http
  seq: 2
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/users/profile"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/users/profile"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "publicId": "",
            "email": "",
            "firstName": "",
            "middleName": "",
            "lastName": "",
            "personPublicId": "",
            "profilePicturePath": "",
            "twitterHandle": "",
            "instagramHandle": "",
            "letterboxdHandle": "",
            "blueskyHandle": ""
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/users/profile"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: Forbidden
    request:
      url: "{{baseUrl}}/users/profile"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
