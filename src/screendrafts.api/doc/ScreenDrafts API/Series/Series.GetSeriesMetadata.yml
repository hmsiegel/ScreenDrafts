info:
  name: Series.GetSeriesMetadata
  type: http
  seq: 1
  tags:
    - Series

http:
  method: GET
  url: "{{baseUrl}}/series/metadata"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/series/metadata"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "socials": [
              {
                "publicId": "",
                "twitter": "",
                "instagram": "",
                "letterboxd": "",
                "bluesky": "",
                "profilePicturePath": ""
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/series/metadata"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: Forbidden
    request:
      url: "{{baseUrl}}/series/metadata"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
