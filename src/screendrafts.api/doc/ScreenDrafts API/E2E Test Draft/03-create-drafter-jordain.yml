info:
  name: 03 Create Drafter - Jordain
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/drafters"
  body:
    type: json
    data: |-
      {
        "personId": "{{jordainPersonId}}"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        expect(res.getStatus()).to.equal(201);
        const id = res.getBody().publicId;
        bru.setEnvVar("jordainDrafterId", id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5