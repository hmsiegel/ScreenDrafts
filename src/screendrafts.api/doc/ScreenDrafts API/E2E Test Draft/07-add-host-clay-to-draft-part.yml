info:
  name: 07 Add Host to DraftPart
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/draft-parts/{{draftPartId}}/hosts"
  body:
    type: json
    data: |-
      {
        "hostPublicId": "{{hostClayPublicId}}",
        "hostRole": 0
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: expect(res.getStatus()).to.equal(204);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
