info:
  name: 11 Set Draft Positions
  type: http
  seq: 11

http:
  method: PUT
  url: "{{baseUrl}}/draft-parts/{{draftPartId}}/positions"
  body:
    type: json
    data: |-
      {
        "positions": 
        [
          {
            "name": "Drafter A",
            "picks": [7, 6, 4, 2],
            "hasBonusVeto": false,
            "hasBonusVetoOverride": false
          },
          {
            "name": "Drafter B",
            "picks": [5, 3, 1],
            "hasBonusVeto": false,
            "hasBonusVetoOverride": false
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: expect(res.getStatus()).to.equal(204);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
