info:
  name: Refresh Token
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:18080/realms/screendrafts/protocol/openid-connect/token
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: refresh_token
      - name: client_id
        value: screendrafts-public-client
      - name: refresh_token
        value: "{{refreshtoken}}"
  auth:
    type: bearer
    token: "{{token}}"

